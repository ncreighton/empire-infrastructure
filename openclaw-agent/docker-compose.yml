services:
  openclaw-agent:
    build: .
    env_file:
      - /opt/empire/.env
    container_name: openclaw-agent
    ports:
      - "8100:8100"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      # Defaults for vars not in .env — env_file values take precedence
      - OPENCLAW_TAGLINE=AI agents & automation tools
      - OPENCLAW_SEO_KEYWORDS=AI,automation,agents,tools,workflows
      - OPENCLAW_BRAND_VOICE=professional
      - OPENCLAW_IMAP_HOST=imap.gmail.com
      - OPENCLAW_IMAP_PORT=993
      - OPENCLAW_DAEMON_MODE=true
      - OPENCLAW_QUIET_START=23
      - OPENCLAW_QUIET_END=7
      - OPENCLAW_MAX_ALERTS_PER_DAY=5
      - OPENCLAW_DEDUP_WINDOW_HOURS=6
      - OPENCLAW_WP_CHECK_TIMEOUT=10
      - OPENCLAW_SERVICE_CHECK_VPS=217.216.84.245
    networks:
      - empire_empire
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8100/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  empire_empire:
    external: true
