    price: 179
    brand: "Sovol"
    release_year: 2022
    best_for: "Best true budget printer with auto leveling"
    skip_if: "Speed matters to you at all"
    notes: "All-metal hotend and ABL at under $200. Hard to beat."
    pros:
      - "All-metal hotend at this price"
      - "Auto bed leveling included"
      - "Dual-gear direct drive"
      - "PEI spring steel bed"
    cons:
      - "Slow compared to newer printers"
      - "Small community vs Ender"
      - "Firmware is bare-bones"

  elegoo_mars_3:
