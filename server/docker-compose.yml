  # -------------------------------------------------------------------------
  # BookForge Agent — Autonomous Multi-Platform Book Publisher
  # Full pipeline: ideation → write → edit → cover → format → publish (7 platforms)
  # Google Play AI audiobook generation → InAudio distribution
  # Telegram bot for mobile control, 26 API endpoints
  # -------------------------------------------------------------------------
  bookforge:
    build:
      context: ./bookforge-agent
      dockerfile: Dockerfile
    container_name: empire-bookforge
    restart: unless-stopped
    ports:
      - "8510:8510"
    env_file:
      - ./bookforge-agent/.env
    volumes:
      - bookforge-data:/data
      - ./bookforge-agent/data/sessions:/data/sessions
    networks:
      - empire
      - empire_empire
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8510/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # -------------------------------------------------------------------------
  # MoneyClaw — Autonomous Crypto Trading Agent
  # 5 strategies, strict risk management, self-evolution, paper trade default
  # -------------------------------------------------------------------------
  crypto-claw:
    build:
      context: ./crypto-claw
      dockerfile: Dockerfile
    container_name: empire-crypto-claw
    restart: unless-stopped
    ports:
      - "8110:8110"
    env_file:
      - ./crypto-claw/configs/.env
    volumes:
      - crypto-claw-data:/app/data
      - ./crypto-claw/configs:/app/configs:ro
    networks:
      - empire
      - empire_empire
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8110/health'); assert r.status_code == 200"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # -------------------------------------------------------------------------
  # Empire Bot — Telegram Commander for full empire control
  # Brain MCP, Docker management, n8n workflows, 16 sites, health monitoring
  # -------------------------------------------------------------------------
  empire-bot:
    build:
      context: ./empire-bot
      dockerfile: Dockerfile
    container_name: empire-bot
    restart: unless-stopped
    network_mode: host
    env_file:
      - ./empire-bot/.env
    volumes:
      - ./config:/app/config:ro
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

