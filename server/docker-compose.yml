volumes:
  n8n-data:
  article-audit-data:
  # openclaw-data: # Moved to openclaw-agent/docker-compose.yml
  bookforge-data:
  crypto-claw-data:

networks:
  empire:
    driver: bridge
  empire_empire:
    external: true
