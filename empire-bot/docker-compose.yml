services:
  empire-bot:
    build: .
    container_name: empire-bot
    restart: unless-stopped
    network_mode: host
    env_file: .env
    volumes:
      - ../config:/app/config:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
