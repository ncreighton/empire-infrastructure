services:
  empire-bot:
    build: .
    container_name: empire-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ../config:/app/config:ro
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - empire
      - empire_empire
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

networks:
  empire:
    driver: bridge
  empire_empire:
    external: true
