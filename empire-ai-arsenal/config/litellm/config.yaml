# ═══════════════════════════════════════════════════════════════
# LiteLLM — Universal LLM Gateway Configuration
# ═══════════════════════════════════════════════════════════════
# All projects hit this single endpoint: http://litellm:4000/v1
# Same OpenAI-compatible API, routed to the best provider.
# ═══════════════════════════════════════════════════════════════

model_list:
  # ── Anthropic (Primary) ──
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192

  - model_name: claude-haiku
    litellm_params:
      model: anthropic/claude-haiku-4-5-20251001
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 4096

  - model_name: claude-opus
    litellm_params:
      model: anthropic/claude-opus-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
      max_tokens: 8192

  # ── OpenAI ──
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  # ── DeepSeek ──
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_key: os.environ/DEEPSEEK_API_KEY

  # ── Google ──
  - model_name: gemini-2.0-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: os.environ/GOOGLE_AI_API_KEY

  # ── Groq (Fast Inference) ──
  - model_name: groq-llama
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY

  - model_name: groq-mixtral
    litellm_params:
      model: groq/mixtral-8x7b-32768
      api_key: os.environ/GROQ_API_KEY

  # ── Local Ollama Models ──
  - model_name: local-llama
    litellm_params:
      model: ollama/llama3.1:8b
      api_base: http://ollama:11434

  - model_name: local-deepseek
    litellm_params:
      model: ollama/deepseek-r1:8b
      api_base: http://ollama:11434

  - model_name: local-qwen
    litellm_params:
      model: ollama/qwen2.5:7b
      api_base: http://ollama:11434

  - model_name: local-embed
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

# ── Router Settings ──
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 120
  retry_after: 5
  allowed_fails: 2
  cooldown_time: 60

# ── Caching (Redis) ──
litellm_settings:
  cache: True
  cache_params:
    type: redis
    host: redis
    port: 6379
    password: os.environ/REDIS_PASSWORD
    ttl: 3600

  # Cost tracking
  success_callback: ["langfuse"]
  langfuse_public_key: os.environ/LANGFUSE_PUBLIC_KEY
  langfuse_secret_key: os.environ/LANGFUSE_SECRET_KEY_FOR_LITELLM
  langfuse_host: http://langfuse:3000

  # Rate limiting
  max_budget: 500
  budget_duration: 30d

  # General
  drop_params: True
  set_verbose: False

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: True
