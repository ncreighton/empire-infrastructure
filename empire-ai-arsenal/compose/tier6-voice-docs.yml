services:
  speaches:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: arsenal-speaches
    restart: unless-stopped
    environment:
      WHISPER_MODEL: large-v3-turbo
      TTS_ENGINE: kokoro
    ports:
    - 0.0.0.0:8100:8000
    volumes:
    - speaches_data:/root/.cache
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")'
        || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
    - arsenal-net
  docling:
    image: quay.io/docling-project/docling-serve:latest
    container_name: arsenal-docling
    restart: unless-stopped
    ports:
    - 0.0.0.0:5002:5001
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:5001/health
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
    - arsenal-net
volumes:
  speaches_data:
    driver: local
networks:
  arsenal-net:
    external: true
