services:
  ollama:
    image: ollama/ollama:latest
    container_name: arsenal-ollama
    restart: unless-stopped
    volumes:
    - ollama_data:/root/.ollama
    ports:
    - 0.0.0.0:11434:11434
    healthcheck:
      test:
      - CMD-SHELL
      - bash -c "</dev/tcp/localhost/11434" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 64G
          cpus: '8.0'
    networks:
    - arsenal-net
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: arsenal-openwebui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OPENAI_API_BASE_URL: http://litellm:4000/v1
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      WEBUI_AUTH: 'true'
      ENABLE_RAG_WEB_SEARCH: 'true'
      RAG_WEB_SEARCH_ENGINE: searxng
      SEARXNG_QUERY_URL: http://searxng:8080/search?q=<query>&format=json
      ENABLE_COMMUNITY_SHARING: 'false'
    volumes:
    - openwebui_data:/app/backend/data
    ports:
    - 0.0.0.0:3000:8080
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8080/health
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
    - arsenal-net
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: arsenal-n8n
    restart: unless-stopped
    environment:
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?Set N8N_BASIC_AUTH_PASSWORD
        in .env}
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-arsenal}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      GENERIC_TIMEZONE: America/New_York
      N8N_DIAGNOSTICS_ENABLED: 'false'
      N8N_PERSONALIZATION_ENABLED: 'false'
      WEBHOOK_URL: http://89.116.29.33:5678/
      N8N_HOST: 0.0.0.0
      N8N_METRICS: 'true'
      EXECUTIONS_DATA_PRUNE: 'true'
      EXECUTIONS_DATA_MAX_AGE: '168'
    volumes:
    - n8n_data:/home/node/.n8n
    ports:
    - 0.0.0.0:5678:5678
    healthcheck:
      test:
      - CMD-SHELL
      - wget -q --spider http://localhost:5678/healthz || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    networks:
    - arsenal-net
  dify-api:
    image: langgenius/dify-api:latest
    container_name: arsenal-dify-api
    restart: unless-stopped
    environment:
      MODE: api
      SECRET_KEY: ${DIFY_SECRET_KEY:-sk-dify-arsenal-secret}
      DB_USERNAME: ${POSTGRES_USER:-arsenal}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      LOG_LEVEL: INFO
      MIGRATION_ENABLED: 'true'
    volumes:
    - dify_storage:/app/api/storage
    ports:
    - 0.0.0.0:5001:5001
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
    - arsenal-net
  dify-worker:
    image: langgenius/dify-api:latest
    container_name: arsenal-dify-worker
    restart: unless-stopped
    environment:
      MODE: worker
      SECRET_KEY: ${DIFY_SECRET_KEY:-sk-dify-arsenal-secret}
      DB_USERNAME: ${POSTGRES_USER:-arsenal}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: dify
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      VECTOR_STORE: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      STORAGE_TYPE: local
      STORAGE_LOCAL_PATH: /app/api/storage
      LOG_LEVEL: INFO
      MIGRATION_ENABLED: 'true'
    volumes:
    - dify_storage:/app/api/storage
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
    - arsenal-net
  dify-web:
    image: langgenius/dify-web:latest
    container_name: arsenal-dify-web
    restart: unless-stopped
    environment:
      CONSOLE_API_URL: http://dify-api:5001
      APP_API_URL: http://dify-api:5001
    ports:
    - 0.0.0.0:3001:3000
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    networks:
    - arsenal-net
volumes:
  ollama_data:
    driver: local
  openwebui_data:
    driver: local
  n8n_data:
    driver: local
  dify_storage:
    driver: local
networks:
  arsenal-net:
    external: true
