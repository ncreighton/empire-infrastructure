services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: arsenal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arsenal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-arsenal}
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - /opt/arsenal/config/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
    - 0.0.0.0:5432:5432
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-arsenal}
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    networks:
    - arsenal-net
  redis:
    image: redis:7-alpine
    container_name: arsenal-redis
    restart: unless-stopped
    command: 'redis-server --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
      --maxmemory 2gb --maxmemory-policy allkeys-lru --appendonly yes

      '
    volumes:
    - redis_data:/data
    ports:
    - 0.0.0.0:6379:6379
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD}
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
    - arsenal-net
  qdrant:
    image: qdrant/qdrant:latest
    container_name: arsenal-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?Set QDRANT_API_KEY in .env}
      QDRANT__STORAGE__STORAGE_PATH: /qdrant/storage
      QDRANT__SERVICE__GRPC_PORT: 6334
    volumes:
    - qdrant_data:/qdrant/storage
    ports:
    - 0.0.0.0:6333:6333
    - 0.0.0.0:6334:6334
    healthcheck:
      test:
      - CMD-SHELL
      - timeout 5 bash -c "</dev/tcp/localhost/6333" || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 8G
          cpus: '2.0'
    networks:
    - arsenal-net
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: arsenal-litellm
    restart: unless-stopped
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?Set LITELLM_MASTER_KEY in .env}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER:-arsenal}:${POSTGRES_PASSWORD}@postgres:5432/litellm
      STORE_MODEL_IN_DB: 'True'
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    volumes:
    - /opt/arsenal/config/litellm/config.yaml:/app/config.yaml:ro
    ports:
    - 0.0.0.0:4000:4000
    command:
    - --config
    - /app/config.yaml
    - --port
    - '4000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c 'import urllib.request; urllib.request.urlopen("http://localhost:4000/health/liveliness")'
        || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    networks:
    - arsenal-net
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local
networks:
  arsenal-net:
    name: arsenal-net
    driver: bridge
